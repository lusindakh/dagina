<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Бидний Хайрын Түүх 💘</title>

  <!-- SOCIAL PREVIEW -->
  <meta property="og:title" content="Бидний Хайрын Түүх 💘" />
  <meta property="og:description" content="Зөвхөн бид хоёрын мэдэх сайт🤭" />
  <meta property="og:image" content="https://lusindakh.github.io/dagina/preview.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lusindakh.github.io/dagina/" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Бидний Хайрын Түүх 💘" />
  <meta name="twitter:description" content="Зөвхөн бид хоёрын мэдэх сайт🤭" />
  <meta name="twitter:image" content="https://lusindakh.github.io/dagina/preview.jpg" />

  <!-- FONTS (optimized preload) -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600&family=Comfortaa:wght@300;400;600&family=Fredoka:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- MAIN CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Background layers -->
  <div class="emoji-layer" id="emojiLayer"></div>
  <div class="heart-rain" id="heartRain"></div>
  <div class="sparkle-layer" id="sparkleLayer"></div>

  <!-- Main Content -->
  <main id="mainContent" class="main">
    <section class="hero">
      <h1>Бидний Хайрын Түүх 💘</h1>
      <p class="hero-subtitle">2024‑08‑08-наас эхлэв</p>
    </section>

    <section class="counter-section">

      <!-- BIG DAY -->
      <div class="card big-day-card">
        <div class="card-label">Хамтдаа өнгөрүүлсэн</div>
        <div class="big-day-value" id="dayCounter">0 дахь өдөр 💞</div>
      </div>

      <!-- FULL COUNTDOWN -->
      <div class="card countdown-card">
        <div class="card-label">2024‑08‑08‑наас хойш</div>
        <div class="countdown-grid">
          <div class="count-item"><span class="count-number" id="years">0</span><span class="count-label">Жил</span></div>
          <div class="count-item"><span class="count-number" id="months">0</span><span class="count-label">Сар</span></div>
          <div class="count-item"><span class="count-number" id="days">0</span><span class="count-label">Өдөр</span></div>
          <div class="count-item"><span class="count-number" id="hours">0</span><span class="count-label">Цаг</span></div>
          <div class="count-item"><span class="count-number" id="minutes">0</span><span class="count-label">Минут</span></div>
          <div class="count-item"><span class="count-number" id="seconds">0</span><span class="count-label">Секунд</span></div>
        </div>
      </div>

      <!-- Romantic Message -->
      <div class="card message-card">
        <div class="card-label">Хулан + Баатар = ❤️</div>
        <div class="romantic-message" id="romanticMessage">Чи миний бүх зүйл ❤️</div>
      </div>

      <!-- Secret Message -->
      <div class="secret-message">
        Хайраа мөөмөө харуул👀❤️
        <div class="close-secret">✕</div>
      </div>

    </section>

    <!-- Gallery -->
    <section class="gallery-section">
      <h2>Хайр Бид 2 📸</h2>
      <div class="gallery-strip" id="galleryStrip">
        <img src="img1.jpg" class="gallery-img" />
        <img src="img2.jpg" class="gallery-img" />
        <img src="img3.jpg" class="gallery-img" />
        <img src="img4.jpg" class="gallery-img" />
        <img src="img5.jpg" class="gallery-img" />
        <img src="img6.jpg" class="gallery-img" />
        <img src="img7.jpg" class="gallery-img" />
        <img src="img8.jpg" class="gallery-img" />
        <img src="img9.jpg" class="gallery-img" />
        <img src="img10.jpg" class="gallery-img" />
        <img src="img11.jpg" class="gallery-img" />
        <img src="img12.jpg" class="gallery-img" />
      </div>
      <p class="gallery-hint">Илүү ихийг цааш нь гүйлгээд үзээрэй 💕</p>
    </section>

  </main>

  <!-- MINI VINYL BUTTON -->
  <div id="miniVinyl" class="mini-vinyl"></div>

  <!-- BOTTOM PLAYER -->
  <div id="bottomPlayer" class="bottom-player">
    <div class="player-header">
      <span>🎵 Манай дуу</span>
      <button id="closePlayer">✖</button>
    </div>

    <div class="vinyl-large" id="vinylLarge"></div>

    <div class="player-controls">
      <button id="prevSong">⏮</button>
      <button id="playPauseSong">▶️</button>
      <button id="nextSong">⏭</button>
    </div>

    <ul id="songList" class="song-list"></ul>
  </div>

  <audio id="bgMusic"></audio>

  <script src="script.js"></script>
  <div class="moon-beam"></div>

</body>
</html>
